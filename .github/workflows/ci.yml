name: RapidLink CI

on:
  push:
    branches: [ "main" ]    # Run on push to main branch
  pull_request:
    branches: [ "main" ]    # Run on PRs targeting main

permissions:
  contents: read    # Allow workflow to read repository code

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10   # Fail job if it runs too long

    services:
      postgres:
        image: postgres:16    # Start PostgreSQL container
        env:
          POSTGRES_DB: rapidlink
          POSTGRES_USER: rapidlink_user
          POSTGRES_PASSWORD: rapidlink_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rapidlink_user -d rapidlink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7    # Start Redis container
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # Download repository code

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven    # Cache dependencies for faster builds

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build & Run Tests
        run: ./mvnw clean verify -Dspring.profiles.active=test    # Build project and run tests with test profile