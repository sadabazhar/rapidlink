name: RapidLink CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rapidlink
          POSTGRES_USER: rapidlink_user
          POSTGRES_PASSWORD: rapidlink_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rapidlink_user -d rapidlink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U rapidlink_user -d rapidlink && exit 0
            echo "Waiting for PostgreSQL..."
            sleep 3
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Build (skip tests temporarily)
        run: ./mvnw clean verify -DskipTests