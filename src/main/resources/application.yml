# Application & Environment Settings

spring:
  application:
    name: rapidlink

  # DataSource configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/rapidlink
    username: rapidlink_user
    password: rapidlink_password
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  # JPA & Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Kolkata

  # JSON Serialization timezone
  jackson:
    time-zone: Asia/Kolkata

  # Database Migration (Flyway)
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5s

server:
  port: 8080

# Logging configuration
logging:
  level:
    org.hibernate.SQL: DEBUG


# ── Actuator & Metrics ──────────────────────────────────────────────
management:
  # Expose monitoring endpoints over HTTP
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

  # Enables /actuator/prometheus endpoint
  endpoint:
    prometheus:
      enabled: true

    # Shows detailed health info (DB, Redis, etc.)
    health:
      show-details: always

  # Adds "application=rapidlink" label to all metrics (useful in Grafana filtering)
  metrics:
    tags:
      application: rapidlink
    enable:
      lettuce: true

    # Enables latency histogram (required for accurate p95/p99 in Prometheus)
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

      percentiles:
        http:
          server:
            requests: 0.5, 0.95, 0.99
            # Calculates latency percentiles:
            # p50 → median
            # p95 → slow users
            # p99 → worst-case latency

