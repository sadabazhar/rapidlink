services:

  postgres:
    image: postgres:16
    container_name: rapidlink-postgres
    restart: always   # Restart container automatically if it stops
    environment:
      POSTGRES_DB: rapidlink    # Main application database
      POSTGRES_USER: rapidlink_user
      POSTGRES_PASSWORD: rapidlink_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data    # Persist DB data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql    # Run script on first startup to create test database
    networks:
      - rapidlink-network   # Shared network for all services

  redis:
    image: redis:7
    container_name: rapidlink-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - rapidlink-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: rapidlink-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - rapidlink-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: rapidlink-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - rapidlink-network


volumes:
  postgres_data:    # Stores Postgres data persistently
  grafana_data:   # Stores Grafana data persistently

networks:
  rapidlink-network:    # Internal network for service communication